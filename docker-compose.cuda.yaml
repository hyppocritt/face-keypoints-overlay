services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    container_name: face-api-cuda
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    expose:
      - "8000"
    volumes:
      - ./weights:/app/weights

  ui:
    image: nginx:alpine
    container_name: face-ui-cuda
    ports:
      - "3000:80"
    volumes:
      - ./src/ui:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api