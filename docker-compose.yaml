services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: face-api
    expose:
      - "8000"
    volumes:
      - ./weights:/app/weights

  ui:
    image: nginx:alpine
    container_name: face-ui
    ports:
      - "3000:80"
    volumes:
      - ./src/ui:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api